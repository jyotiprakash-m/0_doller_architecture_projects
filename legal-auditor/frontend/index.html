<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Privacy-First Legal Document Auditor — AI-powered document analysis that runs entirely locally. Zero data leaves your machine.">
    <title>LegalShield AI — Privacy-First Document Auditor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <span class="brand-name">LegalShield</span>
                    <span class="brand-tag">AI</span>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#upload" class="nav-item" data-page="upload" id="nav-upload">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Upload</span>
                </a>
                <a href="#documents" class="nav-item" data-page="documents" id="nav-documents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Documents</span>
                </a>
                <!-- AI Chat moved to per-document drawer
                <a href="#chat" class="nav-item" data-page="chat" id="nav-chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    <span>AI Chat</span>
                </a>
                -->
            </div>

            <div class="sidebar-footer">
                <div class="privacy-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <div>
                        <span class="privacy-label">100% Private</span>
                        <span class="privacy-sub">All data stays local</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Page content rendered dynamically by app.js -->
            <div id="page-content" class="page-content"></div>
        </main>
    </div>

    <!-- Document Chat Drawer -->
    <div id="chat-drawer-overlay" class="chat-drawer-overlay" onclick="closeChatDrawer()"></div>
    <div id="chat-drawer" class="chat-drawer">
        <div id="chat-drawer-content" class="chat-drawer-content"></div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="components/sidebar.js?v=2"></script>
    <script src="components/dashboard.js?v=2"></script>
    <script src="components/upload.js?v=2"></script>
    <script src="components/documents.js?v=2"></script>
    <script src="components/audit-report.js?v=2"></script>
    <script src="components/chat.js?v=2"></script>
    <script src="components/auth.js?v=2"></script>
    <script src="components/pricing.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
